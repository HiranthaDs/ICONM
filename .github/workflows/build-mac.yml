name: Build Mac DMG

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Change this to your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      # Replace 'main.py' with the actual name of your starting Python script
      run: |
        pyinstaller --windowed --noconfirm --name "IMERP" main.py

    - name: Create DMG
      run: |
        hdiutil create -volname "IMERP" -srcfolder dist/IMERP.app -ov -format UDZO IMERP.dmg

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v3
      with:
        name: IMERP-Mac-Installer
        path: IMERP.dmg